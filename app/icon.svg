<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32">
  <!-- Background -->
  <rect width="32" height="32" rx="6" fill="#050811"/>
  <!-- Study half — green, left -->
  <path d="M16 4 A12 12 0 0 0 16 28 Z" fill="#00ffa3"/>
  <!-- Break half — orange, right -->
  <path d="M16 4 A12 12 0 0 1 16 28 Z" fill="#ff6030"/>
  <!-- Subtle outer ring -->
  <circle cx="16" cy="16" r="12" fill="none" stroke="rgba(255,255,255,0.07)" stroke-width="0.75"/>
  <!-- Hour hand (to 11 o'clock position, in green zone) -->
  <line x1="16" y1="16" x2="12.5" y2="10.5" stroke="#050811" stroke-width="2" stroke-linecap="round" opacity="0.85"/>
  <!-- Minute hand (to 3 o'clock, in orange zone) -->
  <line x1="16" y1="16" x2="22" y2="16" stroke="#050811" stroke-width="1.5" stroke-linecap="round" opacity="0.85"/>
  <!-- Center pivot -->
  <circle cx="16" cy="16" r="2.2" fill="#050811"/>
</svg>
